app:
  base_url: https://alerts.yourdomain.com
  secret_key: change-me-to-a-long-random-string
  secure_cookies: true

auth:
  username: your_username
  # Generate with: python scripts/hash_password.py your_password
  password_hash: $2b$12$replace_with_bcrypt_hash

vapid:
  subject: mailto:you@yourdomain.com
  # Generate with: python scripts/generate_vapid.py
  public_key: replace_with_vapid_public_key
  private_key: replace_with_vapid_private_key

database:
  path: /data/alerts.db
