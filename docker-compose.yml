name: stock-alert

services:
  ib-gateway:
    image: ghcr.io/gnzsnz/ib-gateway:stable
    container_name: stock-alert-ib-gateway
    profiles: ["ibkr"]
    restart: unless-stopped
    environment:
      TWS_USERID: ${TWS_USERID}
      TWS_PASSWORD: ${TWS_PASSWORD}
      TRADING_MODE: ${TRADING_MODE:-paper}
      READ_ONLY_API: ${READ_ONLY_API:-yes}
      TIME_ZONE: ${TIME_ZONE:-Australia/Sydney}
      TZ: ${TIME_ZONE:-Australia/Sydney}
      AUTO_RESTART_TIME: ${AUTO_RESTART_TIME:-11:59 PM}
      TWOFA_TIMEOUT_ACTION: ${TWOFA_TIMEOUT_ACTION:-restart}
      RELOGIN_AFTER_TWOFA_TIMEOUT: ${RELOGIN_AFTER_TWOFA_TIMEOUT:-yes}
      EXISTING_SESSION_DETECTED_ACTION: ${EXISTING_SESSION_DETECTED_ACTION:-primary}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
    ports:
      - "127.0.0.1:4001:4003"
      - "127.0.0.1:4002:4004"

  app:
    build: .
    restart: unless-stopped
    environment:
      SECRETS_PATH: /app/config/secrets.yaml
      IB_GATEWAY_HOST: ib-gateway
      IB_GATEWAY_PORT: ${IB_GATEWAY_PORT:-4004}
      IB_GATEWAY_CONTAINER: ${IB_GATEWAY_CONTAINER:-stock-alert-ib-gateway}
      IB_CLIENT_ID: ${IB_CLIENT_ID:-1}
      IB_TRADING_MODE: ${TRADING_MODE:-paper}
      IB_MAX_DEPTH_SYMBOLS: ${IB_MAX_DEPTH_SYMBOLS:-3}
      VNC_SERVER_PASSWORD: ${VNC_SERVER_PASSWORD:-}
      IB_VNC_HOST: ${IB_VNC_HOST:-ib-gateway}
      IB_VNC_PORT: ${IB_VNC_PORT:-5900}
    volumes:
      - ./data:/data
      - ./config/secrets.yaml:/app/config/secrets.yaml:ro
      - ./docker-compose.yml:/app/docker-compose.yml:ro
      - ./.env:/app/.env:ro
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/nginx/certs:/etc/nginx/certs:ro
